name: Daily ETF Holdings Update

on:
  schedule:
    # 台灣時間 17:15–21:45（UTC+8），週一至週五，每 30 分鐘，共 10 次
    # UTC 09:15–13:45，Mon–Fri
    # 改成 :15/:45 避開 GitHub Actions 整點高負載延遲；範圍拉到 21:45 涵蓋實際延後
    # 的觸發時點，並對齊台灣主動式 ETF 官網持股的實際發佈時間（17:30 後）
    - cron: '15,45 9-13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run ETF update scripts (台股，不含 00988A)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python check_and_update_00981A.py || true
          python check_and_update_00403A.py || true
          python check_and_update_00980A.py || true
          python check_and_update_00985A.py || true
          python check_and_update_00991A.py || true
          python check_and_update_00992A.py || true
          python check_and_update_00982A.py || true
          python check_and_update_00987A.py || true
          python check_and_update_00993A.py || true
          python check_and_update_00995A.py || true
          python check_and_update_index.py || true
          python record_common_actions.py || true
          python export_history.py || true
          python export_snapshots.py || true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_*.json holdings/
          [ -f history.json ] && git add history.json || echo "history.json not produced this run, skipping"
          [ -d snapshots ] && git add snapshots/ || echo "snapshots/ not produced this run, skipping"
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update ETF holdings $(date +'%Y-%m-%d')" && git push
