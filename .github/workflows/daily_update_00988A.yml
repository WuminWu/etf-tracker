name: Daily ETF Holdings Update - 00988A (全球，含美股)

on:
  schedule:
    # 台灣時間 06:00–07:30（週二至週六），對應 UTC 前一天 22:00–23:30（Mon–Fri）
    - cron: '0,30 22-23 * * 1-5'
    # 台灣時間 08:00–10:30（週二至週六），對應 UTC 00:00–02:30（Tue–Sat）
    - cron: '0,30 0-2 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-00988A:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run 00988A update script (等美股收盤後執行)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python check_and_update_00988A.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_00988A.json holdings/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update 00988A holdings $(date +'%Y-%m-%d')" && git push
